<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRISBANK | Mot de passe oublié</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07111f;
      --panel: #0f1b2d;
      --panel-2: #13233a;
      --text: #eef4ff;
      --muted: #9db0cc;
      --primary: #4f7cff;
      --primary-dark: #3e6be8;
      --success: #18c37e;
      --danger: #ef5b5b;
      --line: rgba(255,255,255,0.08);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(79,124,255,0.18), transparent 25%),
        linear-gradient(180deg, #07111f, #0b1729);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 520px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      padding: 30px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      font-weight: 800;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.6;
    }

    .form {
      display: grid;
      gap: 12px;
    }

    .input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      background: rgba(255,255,255,0.03);
      color: #fff;
    }

    .input::placeholder {
      color: #8fa6cc;
    }

    .input:focus {
      outline: none;
      border-color: #4f7cff;
      box-shadow: 0 0 0 4px rgba(79,124,255,0.15);
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #6aa6ff);
    }

    .btn:hover {
      background: linear-gradient(135deg, var(--primary-dark), #5d98ff);
    }

    .msg {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }

    .msg.show { display: block; }
    .msg.ok { background: rgba(24,195,126,0.15); color: #9ff0cd; }
    .msg.err { background: rgba(239,91,91,0.15); color: #ffbcbc; }
    .msg.info { background: rgba(79,124,255,0.15); color: #cfe0ff; }

    .hidden { display: none; }

    .link {
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .link a {
      color: #6aa6ff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mot de passe oublié</h1>
    <p class="subtitle" id="subtitle">
      Entrez votre email pour recevoir un lien de réinitialisation.
    </p>

    <form id="requestForm" class="form">
      <input class="input" type="email" id="email" placeholder="Email" required />
      <button class="btn" type="submit">Envoyer le lien</button>
    </form>

    <form id="resetForm" class="form hidden">
      <input class="input" type="password" id="password" placeholder="Nouveau mot de passe" required />
      <input class="input" type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required />
      <button class="btn" type="submit">Réinitialiser le mot de passe</button>
    </form>

    <div id="message" class="msg"></div>

    <div class="link">
      <a href="/login">Retour à la connexion</a>
    </div>
  </div>

  <script>
    const messageEl = document.getElementById("message");
    const requestForm = document.getElementById("requestForm");
    const resetForm = document.getElementById("resetForm");
    const subtitle = document.getElementById("subtitle");

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const userId = params.get("userId");

    function showMsg(type, text) {
      messageEl.className = "msg show " + type;
      messageEl.textContent = text;
    }

    if (token && userId) {
      requestForm.classList.add("hidden");
      resetForm.classList.remove("hidden");
      subtitle.textContent = "Définissez un nouveau mot de passe pour votre compte.";
    }

    requestForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();

      showMsg("info", "Envoi en cours...");

      try {
        const res = await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ email })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showMsg("err", data.error || "Erreur serveur");
          return;
        }

        showMsg("ok", data.message || "Si cet email existe, un lien a été envoyé.");
      } catch (err) {
        showMsg("err", "Erreur serveur");
      }
    });

    resetForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        showMsg("err", "Les mots de passe ne correspondent pas");
        return;
      }

      showMsg("info", "Réinitialisation en cours...");

      try {
        const res = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ token, userId, password })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showMsg("err", data.error || "Erreur serveur");
          return;
        }

        showMsg("ok", data.message || "Mot de passe réinitialisé");

        setTimeout(() => {
          window.location.href = "/login";
        }, 1200);
      } catch (err) {
        showMsg("err", "Erreur serveur");
      }
    });
  </script>
</body>
</html>

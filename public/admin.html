<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>IrisBank Admin</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f7fb;
}

.layout{
display:flex;
}

.sidebar{
width:230px;
background:#2c3e50;
color:white;
height:100vh;
padding:20px;
position:fixed;
left:0;
top:0;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:12px;
border-radius:6px;
margin-bottom:5px;
cursor:pointer;
}

.sidebar li:hover{
background:#34495e;
}

.content{
margin-left:230px;
padding:30px;
width:100%;
}

h1{
margin-bottom:25px;
}

.stats{
display:flex;
gap:20px;
margin-bottom:30px;
}

.stat-card{
flex:1;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.stat-title{
font-size:14px;
color:#777;
}

.stat-value{
font-size:28px;
font-weight:bold;
margin-top:5px;
}

.chart-container{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card{
background:white;
padding:12px;
border-radius:8px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.account{
display:flex;
justify-content:space-between;
align-items:center;
}

.search{
margin-bottom:10px;
}

.search input{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#3498db;
border:none;
padding:6px 10px;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

.dark{
background:#1e1e1e;
color:white;
}

.dark .card,
.dark .stat-card,
.dark .chart-container{
background:#2c2c2c;
color:white;
}

@media (max-width:900px){
.sidebar{
position:static;
width:100%;
height:auto;
}

.content{
margin-left:0;
}

.layout{
display:block;
}

.stats{
flex-direction:column;
}
}
</style>
</head>
<body>

<div class="layout">

<div class="sidebar">
<h2>IrisBank</h2>
<ul>
<li onclick="showSection('dashboard')">📊 Dashboard</li>
<li onclick="showSection('clients')">👤 Clients</li>
<li onclick="showSection('accounts')">🏦 Comptes</li>
<li onclick="showSection('transactions')">🧾 Transactions</li>
<li onclick="toggleDarkMode()">🌙 Dark Mode</li>
</ul>
</div>

<div class="content">

<div id="dashboard" class="section">
<h1>Dashboard</h1>

<div class="stats">
<div class="stat-card">
<div class="stat-title">Clients</div>
<div class="stat-value" id="totalClients">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Comptes</div>
<div class="stat-value" id="totalAccounts">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Dépôts</div>
<div class="stat-value" id="totalDeposits">0</div>
</div>
</div>

<div class="chart-container">
<canvas id="statsChart"></canvas>
</div>
</div>

<div id="clients" class="section" style="display:none">
<h1>Clients</h1>

<div class="search">
<input type="text" id="searchClient" placeholder="Rechercher client...">
</div>

<div id="clientsTable"></div>
</div>

<div id="accounts" class="section" style="display:none">
<h1>Comptes</h1>
<div id="accountsTable"></div>
</div>

<div id="transactions" class="section" style="display:none">
<h1>Transactions</h1>
<div id="transactionsTable"></div>
</div>

</div>
</div>

<script>
let clientsData = [];
let csrfToken = "";
let statsChart = null;

async function checkAuth(){
  const res = await fetch("/api/auth/me", {
    credentials: "include"
  });

  if(!res.ok){
    window.location.href = "/login.html";
    return false;
  }

  const data = await res.json().catch(() => ({}));
  if (!data.user || data.user.role !== "ADMIN") {
    window.location.href = "/login.html";
    return false;
  }

  return true;
}

async function loadCsrfToken(){
  const res = await fetch("/api/csrf-token", {
    credentials: "include"
  });
  const data = await res.json().catch(() => ({}));
  csrfToken = data.csrfToken || "";
}

async function api(url, method = "GET", body = null){
  const headers = {};

  if(method !== "GET"){
    headers["Content-Type"] = "application/json";
    headers["CSRF-Token"] = csrfToken;
  }

  const res = await fetch(url, {
    method,
    headers,
    credentials: "include",
    body: body ? JSON.stringify(body) : undefined
  });

  const data = await res.json().catch(() => ({}));
  return { res, data };
}

function showSection(section){
  document.querySelectorAll(".section").forEach(s => {
    s.style.display = "none";
  });
  document.getElementById(section).style.display = "block";
}

function toggleDarkMode(){
  document.body.classList.toggle("dark");
}

async function loadStats(){
  const { res, data } = await api("/api/admin/stats");

  if(!res.ok){
    console.error("Erreur stats:", data);
    return;
  }

  document.getElementById("totalClients").innerText = data.clients ?? 0;
  document.getElementById("totalAccounts").innerText = data.accounts ?? 0;
  document.getElementById("totalDeposits").innerText = (data.deposits ?? 0) + " €";

  createChart(data);
}

function createChart(data){
  const ctx = document.getElementById("statsChart");

  if(statsChart){
    statsChart.destroy();
  }

  statsChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Clients", "Comptes", "Dépôts"],
      datasets: [{
        data: [
          Number(data.clients || 0),
          Number(data.accounts || 0),
          Number(data.deposits || 0)
        ],
        backgroundColor: ["#3498db", "#2ecc71", "#f39c12"]
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: false
        }
      }
    }
  });
}

async function loadClients(){
  const { res, data } = await api("/api/admin/clients");

  if(!res.ok){
    console.error("Erreur clients:", data);
    return;
  }

  clientsData = Array.isArray(data) ? data : [];
  renderClients(clientsData);
}

function renderClients(clients){
  let html = "";

  clients.forEach(c => {
    html += `
      <div class="card">
        <strong>${c.nom} ${c.prenom}</strong>
        <small>${c.email}</small>
      </div>
    `;
  });

  document.getElementById("clientsTable").innerHTML = html || "<div class='card'>Aucun client</div>";
}

document.addEventListener("input", e => {
  if(e.target.id === "searchClient"){
    const search = e.target.value.toLowerCase();

    const filtered = clientsData.filter(c =>
      String(c.nom || "").toLowerCase().includes(search) ||
      String(c.prenom || "").toLowerCase().includes(search) ||
      String(c.email || "").toLowerCase().includes(search)
    );

    renderClients(filtered);
  }
});

async function loadAccounts(){
  const { res, data } = await api("/api/admin/accounts");

  if(!res.ok){
    console.error("Erreur comptes:", data);
    return;
  }

  const accounts = Array.isArray(data) ? data : [];
  let html = "";

  accounts.forEach(a => {
    const currentStatus = String(a.statut || "").toUpperCase();
    const buttonLabel = currentStatus === "ACTIF" ? "Bloquer" : "Débloquer";

    html += `
      <div class="card account">
        <div>
          <strong>${a.iban}</strong>
          <small>${a.nom} ${a.prenom}</small>
        </div>

        <div>
          ${a.solde} €
          <button onclick="toggleAccount(${a.id})">${buttonLabel}</button>
        </div>
      </div>
    `;
  });

  document.getElementById("accountsTable").innerHTML = html || "<div class='card'>Aucun compte</div>";
}

async function toggleAccount(id){
  const { res, data } = await api(`/api/admin/accounts/${id}/block`, "PATCH");

  if(!res.ok){
    alert(data.error || "Erreur lors du changement de statut");
    return;
  }

  await loadAccounts();
}

async function loadTransactions(){
  const { res, data } = await api("/api/admin/transactions");

  if(!res.ok){
    console.error("Erreur transactions:", data);
    return;
  }

  const transactions = Array.isArray(data) ? data : [];
  let html = "";

  transactions.forEach(t => {
    html += `
      <div class="card">
        <strong>${t.type}</strong>
        <div>${t.montant} €</div>
        <small>
          Source : ${t.source_iban || "-"} <br>
          Destination : ${t.dest_iban || "-"} <br>
          Date : ${new Date(t.date_transaction).toLocaleString()}
        </small>
      </div>
    `;
  });

  document.getElementById("transactionsTable").innerHTML = html || "<div class='card'>Aucune transaction</div>";
}

(async () => {
  const ok = await checkAuth();
  if(!ok) return;

  await loadCsrfToken();
  await loadStats();
  await loadClients();
  await loadAccounts();
  await loadTransactions();
})();
</script>

</body>
</html>

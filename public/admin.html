<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>IrisBank Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#07111f;
  --bg-soft:#0b1729;
  --sidebar:#0b1524;
  --sidebar-2:#101d31;
  --panel:#0f1b2d;
  --panel-2:#13233a;
  --panel-3:#162841;
  --text:#eef4ff;
  --muted:#9db0cc;
  --primary:#4f7cff;
  --primary-dark:#3e6be8;
  --primary-soft:rgba(79,124,255,0.15);
  --success:#18c37e;
  --success-soft:rgba(24,195,126,0.14);
  --danger:#ef5b5b;
  --danger-soft:rgba(239,91,91,0.14);
  --warning:#f5b942;
  --warning-soft:rgba(245,185,66,0.14);
  --line:rgba(255,255,255,0.08);
  --line-strong:rgba(255,255,255,0.14);
  --shadow:0 24px 60px rgba(0,0,0,0.28);
  --shadow-soft:0 12px 30px rgba(0,0,0,0.18);
  --radius:20px;
  --radius-sm:14px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Inter",sans-serif;
}

body{
  background:
    radial-gradient(circle at top left, rgba(79,124,255,0.18), transparent 22%),
    radial-gradient(circle at top right, rgba(24,195,126,0.08), transparent 18%),
    linear-gradient(180deg,var(--bg),var(--bg-soft));
  color:var(--text);
  min-height:100vh;
}

.layout{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */

.sidebar{
  width:260px;
  background:linear-gradient(180deg,var(--sidebar) 0%, var(--sidebar-2) 100%);
  color:white;
  padding:26px 18px;
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  overflow:auto;
  border-right:1px solid var(--line);
  box-shadow:var(--shadow);
}

.sidebar h2{
  margin-bottom:28px;
  font-size:24px;
  font-weight:800;
  letter-spacing:-0.03em;
}

.sidebar ul{
  list-style:none;
}

.sidebar li{
  padding:13px 14px;
  border-radius:14px;
  margin-bottom:8px;
  cursor:pointer;
  transition:0.2s ease;
  color:#d7e5ff;
  font-weight:600;
}

.sidebar li:hover,
.sidebar li.active{
  background:rgba(255,255,255,0.08);
  transform:translateX(2px);
}

.content{
  margin-left:260px;
  padding:30px;
  width:100%;
}

/* TOPBAR */

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  margin-bottom:26px;
}

.topbar h1{
  font-size:32px;
  margin:0;
  font-weight:800;
  letter-spacing:-0.03em;
}

.topbar p{
  margin-top:8px;
  color:var(--muted);
  line-height:1.6;
}

.top-actions{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.refresh-btn{
  background:#18263c;
  color:white;
  border:none;
  padding:11px 15px;
  border-radius:12px;
  cursor:pointer;
  font-weight:700;
  box-shadow:var(--shadow-soft);
  transition:0.2s ease;
}

.refresh-btn:hover{
  background:#223450;
  transform:translateY(-1px);
}

.notification-bell{
  position:relative;
  background:var(--panel);
  border:1px solid var(--line);
  color:white;
  padding:12px 14px;
  border-radius:14px;
  cursor:pointer;
  box-shadow:var(--shadow-soft);
  font-size:18px;
  transition:0.2s ease;
}

.notification-bell:hover{
  background:var(--panel-2);
}

.notification-count{
  position:absolute;
  top:-6px;
  right:-6px;
  background:var(--danger);
  color:white;
  font-size:11px;
  font-weight:bold;
  padding:4px 7px;
  border-radius:999px;
  min-width:22px;
  text-align:center;
  box-shadow:0 8px 18px rgba(239,91,91,0.25);
}

.notification-panel{
  position:absolute;
  top:58px;
  right:0;
  width:360px;
  max-height:420px;
  overflow:auto;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:14px;
  display:none;
  z-index:100;
}

.notification-wrapper{
  position:relative;
}

.notification-panel.show{
  display:block;
}

.notification-panel h3{
  margin-bottom:12px;
  font-size:18px;
}

.notification-item{
  background:var(--panel-2);
  border-left:4px solid var(--primary);
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.notification-item strong{
  display:block;
  margin-bottom:4px;
}

.notification-item small{
  color:var(--muted);
}

/* STATS */

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-bottom:26px;
}

.stat-card{
  background:linear-gradient(180deg,var(--panel),var(--panel-2));
  padding:22px;
  border-radius:18px;
  box-shadow:var(--shadow-soft);
  border:1px solid var(--line);
}

.stat-title{
  font-size:14px;
  color:var(--muted);
  font-weight:600;
}

.stat-value{
  font-size:32px;
  font-weight:800;
  margin-top:10px;
  letter-spacing:-0.03em;
}

/* CHART */

.chart-container{
  background:linear-gradient(180deg,var(--panel),var(--panel-2));
  padding:22px;
  border-radius:18px;
  margin-bottom:26px;
  box-shadow:var(--shadow-soft);
  border:1px solid var(--line);
}

/* GRID */

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:26px;
}

.section-card{
  background:linear-gradient(180deg,var(--panel),var(--panel-2));
  padding:20px;
  border-radius:18px;
  box-shadow:var(--shadow-soft);
  border:1px solid var(--line);
}

.section-card h2{
  margin-bottom:14px;
  font-size:20px;
  font-weight:800;
  letter-spacing:-0.02em;
}

/* CARDS */

.card{
  background:rgba(255,255,255,0.03);
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
  box-shadow:none;
  border:1px solid var(--line);
}

.card strong{
  display:block;
}

.card small{
  display:block;
  margin-top:6px;
  color:var(--muted);
  line-height:1.5;
}

.account{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.account-left{
  max-width:70%;
}

.search{
  margin-bottom:14px;
}

.search input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--line-strong);
  outline:none;
  background:var(--panel);
  color:white;
}

.search input::placeholder{
  color:#87a0c4;
}

.search input:focus{
  border-color:#60a5fa;
  box-shadow:0 0 0 4px rgba(96,165,250,0.14);
}

/* BUTTONS */

button{
  background:linear-gradient(135deg,var(--primary),#6aa6ff);
  border:none;
  padding:9px 13px;
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  transition:0.18s ease;
}

button:hover{
  background:linear-gradient(135deg,var(--primary-dark),#5d98ff);
  transform:translateY(-1px);
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  margin-top:8px;
}

.badge.actif{
  background:var(--success-soft);
  color:#9ff0cd;
}

.badge.bloque{
  background:var(--danger-soft);
  color:#ffbcbc;
}



/* SCROLLBAR */

.sidebar::-webkit-scrollbar,
.notification-panel::-webkit-scrollbar{
  width:10px;
}

.sidebar::-webkit-scrollbar-thumb,
.notification-panel::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.10);
  border-radius:999px;
}

/* RESPONSIVE */

@media (max-width:1100px){
  .stats{
    grid-template-columns:1fr;
  }

  .grid-2{
    grid-template-columns:1fr;
  }
}

@media (max-width:900px){
  .sidebar{
    position:static;
    width:100%;
    height:auto;
  }

  .content{
    margin-left:0;
  }

  .layout{
    display:block;
  }

  .topbar{
    flex-direction:column;
    align-items:flex-start;
  }

  .top-actions{
    width:100%;
    justify-content:space-between;
  }

  .notification-panel{
    left:0;
    right:auto;
    width:min(92vw,360px);
  }
}
</style>
</head>

<script>
let clientsData = [];
let notificationsData = [];
let transactionsData = [];
let csrfToken = "";
let statsChart = null;

async function checkAuth(){
  const res = await fetch("/api/auth/me", {
    credentials: "include"
  });

  if(!res.ok){
    window.location.href = "/login";
    return false;
  }

  const data = await res.json().catch(() => ({}));

  if (!data.user || data.user.role !== "ADMIN") {
    window.location.href = "/login";
    return false;
  }

  return true;
}

async function loadCsrfToken(){
  const res = await fetch("/api/csrf-token", {
    credentials: "include"
  });
  const data = await res.json().catch(() => ({}));
  csrfToken = data.csrfToken || "";
}

async function api(url, method = "GET", body = null){
  const headers = {};

  if(method !== "GET"){
    headers["Content-Type"] = "application/json";
    headers["CSRF-Token"] = csrfToken;
  }

  const res = await fetch(url, {
    method,
    headers,
    credentials: "include",
    body: body ? JSON.stringify(body) : undefined
  });

  const data = await res.json().catch(() => ({}));
  return { res, data };
}

function showSection(section, el = null){
  document.querySelectorAll(".section").forEach(s => {
    s.style.display = "none";
  });

  document.getElementById(section).style.display = "block";

  document.querySelectorAll(".sidebar li[data-section]").forEach(item => {
    item.classList.remove("active");
  });

  if (el) {
    el.classList.add("active");
  } else {
    const target = document.querySelector(`.sidebar li[data-section="${section}"]`);
    if (target) target.classList.add("active");
  }
}

function toggleDarkMode(){
  document.body.classList.toggle("dark");
}

function toggleNotificationPanel(){
  document.getElementById("notificationPanel").classList.toggle("show");
}

window.addEventListener("click", (e) => {
  const panel = document.getElementById("notificationPanel");
  const wrapper = document.querySelector(".notification-wrapper");

  if (panel && wrapper && !wrapper.contains(e.target)) {
    panel.classList.remove("show");
  }
});

async function loadStats(){
  const { res, data } = await api("/api/admin/stats");

  if(!res.ok){
    console.error("Erreur stats:", data);
    return;
  }

  document.getElementById("totalClients").innerText = data.clients ?? 0;
  document.getElementById("totalAccounts").innerText = data.accounts ?? 0;
  document.getElementById("totalDeposits").innerText = (data.deposits ?? 0) + " €";

  createChart(data);
}

function createChart(data){
  const ctx = document.getElementById("statsChart");

  if(statsChart){
    statsChart.destroy();
  }

  statsChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Clients", "Comptes", "Dépôts"],
      datasets: [{
        data: [
          Number(data.clients || 0),
          Number(data.accounts || 0),
          Number(data.deposits || 0)
        ],
        backgroundColor: ["#4f7cff", "#18c37e", "#f5b942"],
        borderRadius: 10
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: false
        }
      },
      scales: {
        x: {
          ticks: {
            color: "#c8d8f5"
          },
          grid: {
            color: "rgba(255,255,255,0.05)"
          }
        },
        y: {
          ticks: {
            color: "#c8d8f5"
          },
          grid: {
            color: "rgba(255,255,255,0.05)"
          }
        }
      }
    }
  });
}

async function loadNotifications(){
  const { res, data } = await api("/api/admin/notifications");

  if(!res.ok){
    console.error("Erreur notifications:", data);
    return;
  }

  notificationsData = Array.isArray(data) ? data : [];
  document.getElementById("notifCount").innerText = notificationsData.length;
  renderNotifications(notificationsData);
  renderNotificationsPreview(notificationsData.slice(0, 5));
  renderNotificationPanel(notificationsData.slice(0, 8));
}

function renderNotifications(items){
  let html = "";

  items.forEach(n => {
    html += `
      <div class="card">
        <strong>${n.message}</strong>
        <small>${new Date(n.created_at).toLocaleString()}</small>
      </div>
    `;
  });

  document.getElementById("notificationsTable").innerHTML = html || `<div class="empty-state">Aucune notification</div>`;
}

function renderNotificationsPreview(items){
  let html = "";

  items.forEach(n => {
    html += `
      <div class="card">
        <strong>${n.message}</strong>
        <small>${new Date(n.created_at).toLocaleString()}</small>
      </div>
    `;
  });

  document.getElementById("notificationsPreview").innerHTML = html || `<div class="empty-state">Aucune activité récente</div>`;
}

function renderNotificationPanel(items){
  let html = "";

  items.forEach(n => {
    html += `
      <div class="notification-item">
        <strong>${n.message}</strong>
        <small>${new Date(n.created_at).toLocaleString()}</small>
      </div>
    `;
  });

  document.getElementById("notificationPanelList").innerHTML = html || `<div class="empty-state">Aucune notification</div>`;
}

async function loadClients(){
  const { res, data } = await api("/api/admin/clients");

  if(!res.ok){
    console.error("Erreur clients:", data);
    return;
  }

  clientsData = Array.isArray(data) ? data : [];
  renderClients(clientsData);
}

function renderClients(clients){
  let html = "";

  clients.forEach(c => {
    html += `
      <div class="card">
        <strong>${c.nom} ${c.prenom}</strong>
        <small>${c.email}</small>
      </div>
    `;
  });

  document.getElementById("clientsTable").innerHTML = html || `<div class="empty-state">Aucun client</div>`;
}

document.addEventListener("input", e => {
  if(e.target.id === "searchClient"){
    const search = e.target.value.toLowerCase();

    const filtered = clientsData.filter(c =>
      String(c.nom || "").toLowerCase().includes(search) ||
      String(c.prenom || "").toLowerCase().includes(search) ||
      String(c.email || "").toLowerCase().includes(search)
    );

    renderClients(filtered);
  }
});

async function loadAccounts(){
  const { res, data } = await api("/api/admin/accounts");

  if(!res.ok){
    console.error("Erreur comptes:", data);
    return;
  }

  const accounts = Array.isArray(data) ? data : [];
  let html = "";

  accounts.forEach(a => {
    const currentStatus = String(a.statut || "").toUpperCase();
    const buttonLabel = currentStatus === "ACTIF" ? "Bloquer" : "Débloquer";
    const badgeClass = currentStatus === "ACTIF" ? "actif" : "bloque";

    html += `
      <div class="card account">
        <div class="account-left">
          <strong>${a.iban}</strong>
          <small>${a.nom} ${a.prenom}</small>
          <span class="badge ${badgeClass}">${currentStatus}</span>
        </div>

        <div>
          <div style="margin-bottom:10px;font-weight:700;">${a.solde} €</div>
          <button onclick="toggleAccount(${a.id})">${buttonLabel}</button>
        </div>
      </div>
    `;
  });

  document.getElementById("accountsTable").innerHTML = html || `<div class="empty-state">Aucun compte</div>`;
}

async function toggleAccount(id){
  const { res, data } = await api(`/api/admin/accounts/${id}/block`, "PATCH");

  if(!res.ok){
    alert(data.error || "Erreur lors du changement de statut");
    return;
  }

  await loadAccounts();
  await loadNotifications();
}

async function loadTransactions(){
  const { res, data } = await api("/api/admin/transactions");

  if(!res.ok){
    console.error("Erreur transactions:", data);
    return;
  }

  transactionsData = Array.isArray(data) ? data : [];
  renderTransactions(transactionsData);
  renderTransactionsPreview(transactionsData.slice(0, 5));
}

function renderTransactions(items){
  let html = "";

  items.forEach(t => {
    html += `
      <div class="card">
        <strong>${t.type}</strong>
        <div style="margin:6px 0;">${t.montant} €</div>
        <small>
          Source : ${t.source_iban || "-"} <br>
          Destination : ${t.dest_iban || "-"} <br>
          Date : ${new Date(t.date_transaction).toLocaleString()}
        </small>
      </div>
    `;
  });

  document.getElementById("transactionsTable").innerHTML = html || `<div class="empty-state">Aucune transaction</div>`;
}

function renderTransactionsPreview(items){
  let html = "";

  items.forEach(t => {
    html += `
      <div class="card">
        <strong>${t.type}</strong>
        <div style="margin:6px 0;">${t.montant} €</div>
        <small>${new Date(t.date_transaction).toLocaleString()}</small>
      </div>
    `;
  });

  document.getElementById("transactionsPreview").innerHTML = html || `<div class="empty-state">Aucune transaction récente</div>`;
}

async function logout(){
  await api("/api/auth/logout","POST",{});
  window.location.href = "/login";
}

async function resetBank(){

  const confirmReset = confirm("Supprimer toutes les données ?");
  if(!confirmReset) return;

  await loadCsrfToken();

  const {res,data} = await api("/api/admin/reset","DELETE");

  if(res.ok){

    alert("Base réinitialisée");
    refreshAll();

  }else{

    alert(data.error || "Erreur reset");

  }

}

async function refreshAll(){
  await loadCsrfToken();
  await loadStats();
  await loadNotifications();
  await loadClients();
  await loadAccounts();
  await loadTransactions();
}

(async () => {
  const ok = await checkAuth();
  if(!ok) return;

  await refreshAll();
})();
</script>

</body>
</html>

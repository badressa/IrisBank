<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IRISBANK | Connexion</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#07111f;
--bg-soft:#0b1729;
--panel:#0f1b2d;
--panel-2:#13233a;
--text:#eef4ff;
--muted:#9db0cc;
--primary:#4f7cff;
--primary-dark:#3e6be8;
--success:#18c37e;
--danger:#ef5b5b;
--line:rgba(255,255,255,0.08);
--shadow:0 24px 60px rgba(0,0,0,0.25);
--radius:20px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Inter",sans-serif;
}

body{
min-height:100vh;
background:
radial-gradient(circle at top left, rgba(79,124,255,0.18), transparent 25%),
linear-gradient(180deg,var(--bg),var(--bg-soft));
display:flex;
align-items:center;
justify-content:center;
padding:24px;
color:var(--text);
}

/* =========================
   LAYOUT
========================= */

.page{
width:100%;
max-width:1150px;
display:grid;
grid-template-columns:1.1fr 0.9fr;
background:var(--panel);
border-radius:28px;
overflow:hidden;
box-shadow:var(--shadow);
min-height:700px;
border:1px solid var(--line);
}

/* =========================
   LEFT PANEL
========================= */

.left{
background:linear-gradient(160deg,#0b1524 0%, #101d31 50%, #1d3b80 100%);
color:white;
padding:48px;
display:flex;
flex-direction:column;
justify-content:center;
}

.logo{
font-size:20px;
font-weight:800;
margin-bottom:24px;
letter-spacing:1px;
}

.left h1{
font-size:42px;
margin-bottom:18px;
line-height:1.2;
}

.left p{
color:#cfe0ff;
font-size:15px;
line-height:1.7;
}

/* =========================
   RIGHT PANEL
========================= */

.right{
padding:40px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(180deg,var(--panel),var(--panel-2));
}

.card{
width:100%;
max-width:420px;
}

.card h2{
font-size:30px;
margin-bottom:10px;
font-weight:800;
}

.subtitle{
color:var(--muted);
margin-bottom:26px;
}

/* =========================
   FORM
========================= */

.form{
display:grid;
gap:14px;
}

.input{
width:100%;
border:1px solid var(--line);
border-radius:14px;
padding:13px;
font-size:14px;
background:rgba(255,255,255,0.03);
color:white;
}

.input::placeholder{
color:#8fa6cc;
}

.input:focus{
outline:none;
border-color:#4f7cff;
box-shadow:0 0 0 4px rgba(79,124,255,0.15);
}

/* =========================
   BUTTON
========================= */

.btn{
width:100%;
border:none;
border-radius:14px;
padding:14px;
font-size:15px;
font-weight:700;
cursor:pointer;
background:linear-gradient(135deg,var(--primary),#6aa6ff);
color:white;
transition:0.2s;
}

.btn:hover{
background:linear-gradient(135deg,var(--primary-dark),#5d98ff);
transform:translateY(-1px);
}

/* =========================
   LINK
========================= */

.link{
text-align:center;
margin-top:16px;
font-size:14px;
color:var(--muted);
}

.link a{
color:#6aa6ff;
text-decoration:none;
font-weight:700;
}

/* =========================
   MESSAGE
========================= */

.msg{
margin-top:14px;
padding:12px;
border-radius:12px;
display:none;
font-size:14px;
}

.msg.show{
display:block;
}

.msg.ok{
background:rgba(24,195,126,0.15);
color:#9ff0cd;
}

.msg.err{
background:rgba(239,91,91,0.15);
color:#ffbcbc;
}

.msg.info{
background:rgba(79,124,255,0.15);
color:#cfe0ff;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width:900px){

.page{
grid-template-columns:1fr;
}

.left{
padding:30px;
text-align:center;
}

.right{
padding:30px;
}

}

</style>
</head>

<body>

<div class="page">

<div class="left">

<div class="logo">IRISBANK</div>

<h1>Bienvenue sur votre espace bancaire</h1>

<p>
Connectez-vous pour accéder à vos comptes, effectuer des virements et gérer vos opérations bancaires en toute sécurité.
</p>

</div>

<div class="right">

<div class="card">

<h2>Connexion</h2>
<p class="subtitle">Accédez à votre espace client ou administrateur.</p>

<form id="loginForm" class="form">

<input class="input" type="email" id="email" placeholder="Email" required>
<input class="input" type="password" id="password" placeholder="Mot de passe" required>

<button class="btn" type="submit">Se connecter</button>

</form>

<div class="link">
Pas encore de compte ?
<a href="/register.html">Créer un compte</a>
</div>

<div id="message" class="msg"></div>

</div>

</div>

</div>

<script>

let csrfToken = "";

async function loadCsrfToken(){

const res = await fetch("/api/csrf-token", {
credentials: "include"
});
const data = await res.json();

csrfToken = data.csrfToken;

}

document.getElementById("loginForm").addEventListener("submit", async (e) => {

e.preventDefault();

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

const msg = document.getElementById("message");

msg.className = "msg show info";
msg.textContent = "Connexion...";

try{

const response = await fetch("/api/auth/login",{
method:"POST",
headers:{
"Content-Type":"application/json",
"CSRF-Token":csrfToken
},
credentials:"include",
body:JSON.stringify({email,password})
});

const data = await response.json();

if(!response.ok){

msg.className = "msg show err";
msg.textContent = data.error || "Erreur connexion";
return;

}

msg.className = "msg show ok";
msg.textContent = "Connexion réussie";

const isAdmin =
data?.is_admin === 1 ||
data?.is_admin === true ||
data?.user?.is_admin === 1 ||
data?.user?.is_admin === true;

setTimeout(() => {

if(isAdmin){

window.location.href = "/admin.html";

}else{

window.location.href = "/dashboard.html";

}

},600);

}catch(err){

msg.className = "msg show err";
msg.textContent = "Erreur serveur";

}

});

loadCsrfToken();

</script>

</body>
</html>

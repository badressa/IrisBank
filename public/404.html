<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 | Page introuvable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
--bg:#07111f;
--bg-soft:#0b1729;
--panel:rgba(15,27,45,0.84);
--text:#eef4ff;
--muted:#9db0cc;
--primary:#4f7cff;
--line:rgba(255,255,255,0.08);
--radius:28px;
--shadow:0 24px 70px rgba(0,0,0,0.3);
}

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
display:grid;
place-items:center;
padding:24px;
font-family:"Manrope",sans-serif;
color:var(--text);
background:
radial-gradient(circle at top left, rgba(79,124,255,0.22), transparent 24%),
radial-gradient(circle at bottom right, rgba(245,185,66,0.10), transparent 20%),
linear-gradient(180deg,var(--bg),var(--bg-soft));
}

.card{
width:min(720px,100%);
padding:40px;
border-radius:var(--radius);
background:var(--panel);
border:1px solid var(--line);
box-shadow:var(--shadow);
text-align:center;
}

.code{
font-family:"Space Grotesk",sans-serif;
font-size:clamp(72px,14vw,132px);
line-height:0.9;
letter-spacing:-0.08em;
margin:0 0 18px;
background:linear-gradient(135deg,#eef4ff,#7eb0ff);
color:transparent;
background-clip:text;
}

h1{
margin:0 0 12px;
font-size:36px;
}

p{
margin:0 auto 28px;
max-width:54ch;
line-height:1.8;
color:var(--muted);
}

.actions{
display:flex;
justify-content:center;
gap:14px;
flex-wrap:wrap;
}

.button,
.ghost{
padding:13px 20px;
border-radius:999px;
font-weight:800;
text-decoration:none;
transition:0.2s ease;
}

.button{
background:linear-gradient(135deg,var(--primary),#6aa6ff);
color:white;
box-shadow:0 16px 40px rgba(79,124,255,0.28);
}

.ghost{
border:1px solid var(--line);
color:#dce7fb;
background:rgba(255,255,255,0.03);
}

.button:hover,
.ghost:hover{
transform:translateY(-1px);
}
</style>
</head>
<body>
  <main class="card">
    <div class="code">404</div>
    <h1>Cette page n’existe pas</h1>
    <p>L’URL demandée ne correspond à aucune page HTML de l’application. Repars depuis l’accueil ou va directement vers la connexion.</p>
    <div class="actions">
      <a class="button" href="/">Retour à l’accueil</a>
      <a class="ghost" href="/login">Connexion</a>
    </div>
  </main>
</body>
</html>
